    </radialGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#db2777" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Aura -->
  <ellipse cx="200" cy="118" rx="28" ry="44" fill="url(#glow)"/>

