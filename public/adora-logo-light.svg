  <text x="221" y="168" font-family="'Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="900" text-anchor="start" fill="url(#txt)">ra</text>

  <!-- Lengua izquierda -->
  <path d="M 202 166 C 209 166 219 159 220 149 C 221 139 219 127 217 117 C 215 107 212 100 209 95 C 206 91 204 97 200 103 C 196 97 194 91 191 87 C 188 92 185 103 183 114 C 181 126 179 138 178 148 C 177 158 184 167 194 168 C 197 169 200 167 202 166 Z"
