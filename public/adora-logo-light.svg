  <!-- Reflejo -->
  <ellipse cx="188" cy="116" rx="2.5" ry="7" fill="#ffffff" opacity="0.50" transform="rotate(-18 188 116)"/>

  <!-- Tagline -->
  <text x="200" y="192" font-family="'Helvetica Neue',Arial,sans-serif" font-size="9.5" font-weight="300" letter-spacing="5" text-anchor="middle" fill="#9ca3af">ALABANZAS  CRISTIANAS</text>
  <line x1="116" y1="200" x2="284" y2="200" stroke="#f472b6" stroke-width="1" opacity="0.28"/>
